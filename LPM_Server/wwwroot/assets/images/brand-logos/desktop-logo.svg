<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44">
  <defs>
    <linearGradient id="gUp" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gDn" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Icon: two interlocking triangles ── -->
  <g transform="translate(4, 2)" filter="url(#glow)">
    <!-- Green triangle UP -->
    <polygon points="20,1 39,33 1,33" fill="url(#gUp)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Blue triangle DOWN, shifted right -->
    <polygon points="14,7 46,7 30,39" fill="url(#gDn)" opacity="0.85">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </polygon>
    <!-- Bright overlap accent -->
    <polygon points="24,12 33,12 30,33 20,33" fill="#06b6d4" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.55;0.35" dur="5s" begin="1.2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <!-- ── Text ── -->
  <text x="58" y="31" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-size="25" letter-spacing="-0.3">
    <tspan fill="#059669" font-weight="300">Life</tspan><tspan fill="#1e3a5f" font-weight="700">Power</tspan>
  </text>
</svg>
