<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44">
  <defs>
    <linearGradient id="gUp" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gDn" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="olG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g transform="translate(4, 2)" filter="url(#glow)">
    <!-- Green triangle UP — gentle sway clockwise -->
    <polygon points="20,1 39,33 1,33" fill="url(#gUp)" opacity="0.92">
      <animate attributeName="opacity" values="0.88;1;0.88" dur="4s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 20 22;3 20 22;0 20 22;-3 20 22;0 20 22" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </polygon>

    <!-- Blue triangle DOWN — gentle sway counter-clockwise -->
    <polygon points="14,7 46,7 30,39" fill="url(#gDn)" opacity="0.88">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0 30 20;-3 30 20;0 30 20;3 30 20;0 30 20" dur="8s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1;0.4 0 0.6 1"/>
    </polygon>

    <!-- Overlap diamond — gentle scale pulse -->
    <polygon points="24,12 33,12 30,33 20,33" fill="url(#olG)" opacity="0.4">
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="4s" begin="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
      <animateTransform attributeName="transform" type="scale" values="1;1.06;1" dur="4s" begin="1s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1" additive="sum"/>
    </polygon>
  </g>

  <text x="58" y="31" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-size="25" letter-spacing="-0.3">
    <tspan fill="#059669" font-weight="300">Life</tspan><tspan fill="#1e3a5f" font-weight="700">Power</tspan>
  </text>
</svg>
