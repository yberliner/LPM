<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 44" width="260" height="44">
  <defs>
    <linearGradient id="gUpD" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="gDnD" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glowD" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g transform="translate(4, 2)" filter="url(#glowD)">
    <polygon points="20,1 39,33 1,33" fill="url(#gUpD)" opacity="0.9">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="14,7 46,7 30,39" fill="url(#gDnD)" opacity="0.85">
      <animate attributeName="opacity" values="0.85;1;0.85" dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="24,12 33,12 30,33 20,33" fill="#22d3ee" opacity="0.35">
      <animate attributeName="opacity" values="0.35;0.55;0.35" dur="5s" begin="1.2s" repeatCount="indefinite"/>
    </polygon>
  </g>
  <text x="58" y="31" font-family="'Segoe UI', 'Inter', system-ui, sans-serif" font-size="25" letter-spacing="-0.3">
    <tspan fill="#6ee7b7" font-weight="300">Life</tspan><tspan fill="#e2e8f0" font-weight="700">Power</tspan>
  </text>
</svg>
